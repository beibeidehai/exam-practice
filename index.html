<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI面试官</title>
<style>
  :root {
    --c1: #6366f1; --c2: #818cf8; --bg: #f5f5f7; --card: #fff;
    --text: #1e1e2e; --sub: #6b7280; --ok: #22c55e; --warn: #f59e0b;
    --radius: 14px; --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }

  .container { max-width: 500px; margin: 0 auto; padding: 16px; }

  .header { text-align: center; padding: 24px 0 8px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { color: var(--sub); font-size: 13px; margin-top: 4px; }

  /* Setup card */
  .setup { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin: 16px 0; display: flex; flex-direction: column; gap: 10px; }
  .setup label { font-size: 13px; font-weight: 600; color: var(--sub); }
  .setup select, .setup input { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; background: #fafafa; color: var(--text); outline: none; }
  .setup select:focus, .setup input:focus { border-color: var(--c1); }
  .setup .row { display: flex; gap: 10px; }
  .setup .row > * { flex: 1; }

  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; color: #fff; background: var(--c1); transition: opacity .2s, transform .1s; }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .5; pointer-events: none; }

  /* Chat area */
  .chat { margin: 16px 0; }
  .msg { margin-bottom: 12px; display: flex; gap: 8px; }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; background: #f3f4f6; }
  .msg.assistant .avatar { background: #eef0ff; }
  .msg.user .avatar { background: #e0e7ff; }
  .msg .bubble { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-break: break-word; }
  .msg.assistant .bubble { background: var(--card); box-shadow: var(--shadow); border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--c1); color: #fff; border-bottom-right-radius: 4px; }
  .msg .bubble .meta { font-size: 11px; color: var(--sub); margin-top: 6px; }

  /* Input area */
  .input-area { background: var(--card); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); display: flex; gap: 8px; position: sticky; bottom: 16px; }
  .input-area textarea { flex: 1; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; font-size: 14px; resize: none; height: 48px; outline: none; font-family: inherit; }
  .input-area textarea:focus { border-color: var(--c1); }
  .input-area .send-btn { width: 48px; height: 48px; border-radius: 50%; border: none; background: var(--c1); color: #fff; font-size: 20px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity .2s; }
  .input-area .send-btn:disabled { opacity: .4; }
  .input-area .end-btn { padding: 0 14px; height: 48px; border-radius: 10px; border: 1.5px solid #fca5a5; background: #fef2f2; color: #dc2626; font-size: 13px; cursor: pointer; white-space: nowrap; }

  /* Score panel */
  .score-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin: 16px 0; }
  .score-card h2 { text-align: center; margin-bottom: 16px; }
  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .score-item { text-align: center; padding: 12px; background: #f9fafb; border-radius: 10px; }
  .score-item .num { font-size: 28px; font-weight: 800; color: var(--c1); }
  .score-item .tag { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .total-score { text-align: center; font-size: 20px; font-weight: 700; padding: 10px; }
  .summary { font-size: 14px; line-height: 1.6; color: var(--sub); margin-bottom: 10px; padding: 12px; background: #f9fafb; border-radius: 10px; }
  .tips { font-size: 13px; color: var(--warn); line-height: 1.8; }
  .tips li { margin-left: 16px; }

  /* Loading */
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #ccc; animation: bounce 1.4s infinite ease-in-out both; }
  .typing span:nth-child(1) { animation-delay: -0.32s; }
  .typing span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

  .footer { text-align: center; padding: 20px; color: #ccc; font-size: 11px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>AI 面试官</h1>
    <p>选择岗位，开始模拟面试 · AI追问 & 多维评分</p>
  </div>

  <div id="setupArea" class="setup">
    <div class="row">
      <div>
        <label>目标岗位</label>
        <select id="roleSelect">
          <option value="互联网产品经理">产品经理</option>
          <option value="Java后端开发工程师">Java后端开发</option>
          <option value="前端开发工程师">前端开发</option>
          <option value="数据分析师">数据分析师</option>
          <option value="算法工程师">算法工程师</option>
          <option value="软件测试工程师">测试工程师</option>
          <option value="运营经理">运营经理</option>
          <option value="市场营销经理">市场营销</option>
        </select>
      </div>
      <div>
        <label>面试难度</label>
        <select id="difficultySelect">
          <option value="校招/实习">校招/实习</option>
          <option value="社招1-3年">社招1-3年</option>
          <option value="社招3-5年">社招3-5年</option>
          <option value="大厂高级">大厂高级</option>
        </select>
      </div>
    </div>
    <button class="btn" id="startBtn" onclick="startInterview()">开始面试</button>
  </div>

  <div id="chatArea" class="chat" style="display:none;"></div>
  <div id="typingArea" style="display:none;padding:0 16px 16px;" class="typing"><span></span><span></span><span></span></div>

  <div id="inputArea" class="input-area" style="display:none;">
    <textarea id="answerInput" placeholder="输入你的回答..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendAnswer()" disabled>></button>
    <button class="end-btn" onclick="endInterview()">结束</button>
  </div>

  <div id="scoreArea"></div>
  <div id="restartArea" style="text-align:center;display:none;">
    <button class="btn" onclick="location.reload()" style="margin-top:16px;">重新开始</button>
  </div>

  <div class="footer">Powered by DeepSeek · AI模拟面试，仅供参考</div>
</div>

<script>
let sid = null, waiting = false;

async function startInterview() {
  const role = document.getElementById('roleSelect').value;
  const difficulty = document.getElementById('difficultySelect').value;
  const btn = document.getElementById('startBtn');
  btn.disabled = true; btn.textContent = 'AI面试官准备中...';

  try {
    const res = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role, difficulty }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    sid = data.sid;
    document.getElementById('setupArea').style.display = 'none';
    document.getElementById('chatArea').style.display = 'block';
    document.getElementById('inputArea').style.display = 'flex';
    addMsg('assistant', data.reply);
    enableInput();
  } catch (e) {
    alert('启动失败: ' + e.message);
    btn.disabled = false; btn.textContent = '开始面试';
  }
}

async function sendAnswer() {
  if (waiting) return;
  const input = document.getElementById('answerInput');
  const text = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  input.value = '';
  disableInput();
  showTyping();

  try {
    const res = await fetch('/api/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sid, answer: text }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    hideTyping();

    if (data.done) {
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('restartArea').style.display = 'block';
      showScore(data.evaluation);
    } else {
      addMsg('assistant', data.reply);
      enableInput();
    }
  } catch (e) {
    hideTyping();
    addMsg('assistant', '抱歉，出了点问题，请重试。');
    enableInput();
  }
}

async function endInterview() {
  if (waiting) return;
  disableInput();
  showTyping();
  try {
    const res = await fetch('/api/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sid, answer: '结束面试' }),
    });
    const data = await res.json();
    hideTyping();
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('restartArea').style.display = 'block';
    if (data.done && data.evaluation) showScore(data.evaluation);
  } catch (e) {
    hideTyping();
    location.reload();
  }
}

function addMsg(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'assistant' ? '🤖' : '👤';
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
  area.appendChild(div);
  setTimeout(() => div.scrollIntoView({ behavior: 'smooth' }), 100);
}

function showScore(ev) {
  const area = document.getElementById('scoreArea');
  area.innerHTML = `<div class="score-card">
    <h2>面试评估报告</h2>
    <div class="score-grid">
      <div class="score-item"><div class="num">${ev['专业能力']||'-'}</div><div class="tag">专业能力</div></div>
      <div class="score-item"><div class="num">${ev['逻辑表达']||'-'}</div><div class="tag">逻辑表达</div></div>
      <div class="score-item"><div class="num">${ev['沟通技巧']||'-'}</div><div class="tag">沟通技巧</div></div>
      <div class="score-item"><div class="num">${ev['临场应变']||'-'}</div><div class="tag">临场应变</div></div>
    </div>
    <div class="total-score">总分：${ev['总分']||'-'} / 40</div>
    <div class="summary">${ev['总结']||''}</div>
    ${ev['建议'] ? '<ul class="tips">'+ev['建议'].map(t=>'<li>'+t+'</li>').join('')+'</ul>' : ''}
  </div>`;
  setTimeout(() => area.scrollIntoView({ behavior: 'smooth' }), 200);
}

function showTyping() { document.getElementById('typingArea').style.display = 'flex'; }
function hideTyping() { document.getElementById('typingArea').style.display = 'none'; }
function disableInput() {
  waiting = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('answerInput').disabled = true;
}
function enableInput() {
  waiting = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('answerInput').disabled = false;
  document.getElementById('answerInput').focus();
}

document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAnswer(); }
});
</script>
</body>
</html>
